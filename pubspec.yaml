name: task_project
description: "A new Flutter project."

# Prevent accidental publishing to pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Localization and Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  intl_utils: ^2.8.7
  flutter_localization: ^0.3.3

  # Networking and Connectivity
  dio: ^5.9.2
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.1

  # UI and Navigation
  shimmer: ^3.0.0
  go_router: ^17.1.0
  provider: ^6.1.5+1

  # Storage and Local Features
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2


  # Code Generation Support

  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Note: You likely need build_runner, freezed, and json_serializable here
  # if you are using freezed/json_annotation.
  build_runner: ^2.4.13
  
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/